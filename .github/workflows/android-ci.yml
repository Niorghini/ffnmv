name: CI
on:
  push:
    branches: [main, dev-android]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: false

      - name: Test
        run: npm run test

      - name: Build (web)
        run: npm run build

      - name: Upload dist artifact
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev-android'
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 7
