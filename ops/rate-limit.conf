# ffnmv 登录限速 (http 块)
#
# 部署目标: /etc/nginx/conf.d/rate-limit.conf
# 2026-06-19 改造:
#   - $binary_remote_addr 按客户端 IP 限速
#   - 10r/m = 每 IP 每分钟 10 次(够真人用,挡住脚本撞库)
#   - 10m zone 大约能存 16 万个 IP,生产绰绰有余
#
# 配对的 server 块在 ops/nginx.conf,4 条 exact-match location
# 引用了这里定义的 zone 名 auth_login

limit_req_zone $binary_remote_addr zone=auth_login:10m rate=10r/m;
