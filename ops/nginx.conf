# ffnmv nginx site config
#
# 部署目标: /etc/nginx/sites-available/ffnmv
# 2026-06-19 改造:
#   - 现有 5 个安全头版本化 + Cross-Origin-Opener-Policy
#   - CSP 统一加单引号,connect-src 加 wss:/ws: 保险支持 Realtime
#   - gzip 完整配置(vary/comp_level/types)
#   - 登录限速 4 条 exact-match location,优先于通用 regex location
#   - HSTS 预埋,等 HTTPS 上线后启用
#
# 依赖:
#   - /etc/nginx/conf.d/rate-limit.conf  定义 limit_req_zone (10r/m, 10m, $binary_remote_addr)
#   - /etc/nginx/conf.d/gzip.conf        定义 gzip 类型/等级 (http 块)
#
# 上游 Kong: http://127.0.0.1:8000 (supabase docker stack)

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/ffnmv/dist;
    index index.html;

    # ─── Security headers ────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: ws:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    # HSTS 预埋,等 HTTPS 上线后启用 (item 2 评估项):
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── gzip (server 块,覆盖 nginx.conf 默认 on) ─────────────────
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss text/javascript image/svg+xml font/woff2;

    # ─── 登录限速 (4 条 exact-match location 必须放在通用 regex location 之前) ───
    # exact match (=) 优先级高于 regex (~),所以这里会先匹配
    # limit_req_zone  在 /etc/nginx/conf.d/rate-limit.conf 定义
    # burst=5 允许短时 5 次突发,超过立即 429
    location = /auth/v1/token  { limit_req zone=auth_login burst=5 nodelay; limit_req_status 429; proxy_pass http://127.0.0.1:8000; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location = /auth/v1/signup { limit_req zone=auth_login burst=5 nodelay; limit_req_status 429; proxy_pass http://127.0.0.1:8000; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location = /auth/v1/verify { limit_req zone=auth_login burst=5 nodelay; limit_req_status 429; proxy_pass http://127.0.0.1:8000; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location ~ ^/auth/v1/otp/  { limit_req zone=auth_login burst=5 nodelay; limit_req_status 429; proxy_pass http://127.0.0.1:8000; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }

    # ─── Supabase API reverse proxy (auth/rest/realtime/storage/functions) ───
    # 兜底: 上面 4 条没命中的 /auth/v1/* 走这里
    location ~ ^/(auth|rest|realtime|storage|functions)/v1/(.*)$ {
        proxy_pass http://127.0.0.1:8000/$1/v1/$2$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Realtime 升级 (WebSocket)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ─── 静态资源 (SPA history fallback) + Cache-Control 头(2026-06-20 强化)────────
    # / 永远不缓存,部署后所有用户必拉新 index.html(避免旧 hash 错乱)
    location = / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /index.html =404;
    }
    # /assets/* 永久缓存(hash 文件名永不变,部署 hash 变就靠 / no-cache 兜底)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }
    # 其他路径 SPA fallback(原行为,未知 URL → index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
